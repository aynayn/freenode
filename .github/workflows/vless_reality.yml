name: Fetch and Filter Clean Proxy Nodes

on:
  schedule:
    - cron: '23 1,7,13,19 * * *' # ၆ နာရီတစ်ကြိမ် Auto Run မည်
  workflow_dispatch: # Manual နှိပ်ပြီး Run ချင်လျှင်လည်း ရသည်

permissions:
  contents: write # ရလဒ်များကို Repo ထဲသို့ ပြန်သိမ်းရန် အခွင့်အရေးပေးခြင်း

jobs:
  collect-nodes:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Fetch, Filter Nodes and Update Metadata
      run: |
        cat << 'EOF' > fetch_and_meta.py
        import requests
        import base64
        import re
        import os
        import glob
        import json
        from datetime import datetime, timezone, timedelta

        # ၁။ လက်ရှိ ရှိနေတဲ့ အချိန်မှတ်တမ်း (metadata.json) ကို အရင်ဖတ်ပါမယ်
        metadata = {}
        if os.path.exists('metadata.json'):
            try:
                with open('metadata.json', 'r', encoding='utf-8') as f:
                    metadata = json.load(f)
            except Exception as e:
                print(f"Error reading metadata.json: {e}")

        # မြန်မာစံတော်ချိန် (UTC + 6:30) ကို ရယူခြင်း
        mm_timezone = timezone(timedelta(hours=6, minutes=30))
        current_time_str = datetime.now(mm_timezone).strftime("%d.%m.%Y %H:%M")

        base_dom = 'https://' + 'raw.' + 'githubusercontent' + '.com/'
        headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)'}

        sources = [
            base_dom + 'Epodonios/v2ray-configs/main/Splitted-By-Protocol/vless.txt',
            base_dom + 'Epodonios/v2ray-configs/main/Splitted-By-Protocol/trojan.txt',
            base_dom + 'ebrasha/free-v2ray-public-list/refs/heads/main/vless_configs.txt',
            base_dom + 'ebrasha/free-v2ray-public-list/refs/heads/main/trojan_configs.txt',
            base_dom + 'barry-far/V2ray-config/main/Splitted-By-Protocol/vless.txt',
            base_dom + 'barry-far/V2ray-config/main/Splitted-By-Protocol/trojan.txt',
            base_dom + 'MatinGhanbari/v2ray-configs/main/subscriptions/filtered/subs/vless.txt',
            base_dom + 'MatinGhanbari/v2ray-configs/main/subscriptions/filtered/subs/trojan.txt',
            base_dom + 'MatinGhanbari/v2ray-configs/main/subscriptions/filtered/subs/hysteria2.txt',
            base_dom + 'SoliSpirit/v2ray-configs/refs/heads/main/Protocols/vless.txt',
            base_dom + 'SoliSpirit/v2ray-configs/refs/heads/main/Protocols/trojan.txt'
        ]

        valid_nodes = []

        def extract_nodes(text):
            lines = text.split('\n')
            for line in lines:
                line = line.strip()
                if line.startswith('vless://') and 'reality' in line.lower():
                    if line not in valid_nodes: valid_nodes.append(line)
                elif line.startswith('trojan://'):
                    if line not in valid_nodes: valid_nodes.append(line)
                elif line.startswith('hy2://') or line.startswith('hysteria2://'):
                    if line not in valid_nodes: valid_nodes.append(line)

        for url in sources:
            try:
                res = requests.get(url, headers=headers, timeout=15)
                if res.status_code == 200:
                    content = res.text.strip()
                    if content and not any(s in content for s in ['vless://', 'trojan://', 'hy2://']):
                        try:
                            cleaned_content = content.replace('\r', '').replace('\n', '').replace(' ', '')
                            cleaned_content += '=' * (-len(cleaned_content) % 4)
                            decoded = base64.b64decode(cleaned_content).decode('utf-8', errors='ignore')
                            if any(s in decoded for s in ['vless://', 'trojan://', 'hy2://']):
                                content = decoded
                        except:
                            pass
                    extract_nodes(content)
            except Exception as e:
                print(f'Error fetching from {url}: {e}')

        if valid_nodes:
            chunk_size = 1000
            new_files = {}
            
            # ဖိုင်အသစ်များကို Memory ထဲတွင် အရင်ခွဲထုတ်ထားခြင်း
            for i in range(0, len(valid_nodes), chunk_size):
                part_nodes = valid_nodes[i:i + chunk_size]
                part_str = f'{(i // chunk_size):03d}'
                filename = f'sub_part{part_str}.txt'
                
                combined_text = '\n'.join(part_nodes)
                b64_content = base64.b64encode(combined_text.encode('utf-8')).decode('utf-8')
                new_files[filename] = b64_content

            # Local ပေါ်က မလိုတော့တဲ့ ဖိုင်ဟောင်းတွေကို ဖျက်ထုတ်ခြင်း
            existing_disk_files = glob.glob('sub_part*')
            for f in existing_disk_files:
                if f not in new_files:
                    try:
                        os.remove(f)
                        print(f"Removed obsolete file: {f}")
                    except Exception as e:
                        print(f"Error removing {f}: {e}")
                    if f in metadata:
                        del metadata[f]

            # ဖိုင်များကို စစ်ဆေးပြီး အသစ်ရေးခြင်း သို့မဟုတ် နဂိုအတိုင်းထားခြင်း
            new_metadata = {}
            for filename, content in new_files.items():
                is_changed = True
                if os.path.exists(filename):
                    try:
                        with open(filename, 'r', encoding='utf-8') as f:
                            old_content = f.read().strip()
                        if old_content == content.strip():
                            is_changed = False
                    except Exception as e:
                        print(f"Error reading existing file {filename}: {e}")

                if is_changed:
                    with open(filename, 'w', encoding='utf-8') as f:
                        f.write(content)
                    new_metadata[filename] = current_time_str
                    print(f"Updated {filename} with new nodes at {current_time_str}")
                else:
                    # မပြောင်းလဲပါက မူရင်း Date/Time ကို ဆက်သုံးပါမည်
                    new_metadata[filename] = metadata.get(filename, current_time_str)
                    print(f"Kept existing {filename} (no changes). Timestamp: {new_metadata[filename]}")

            # metadata.json အား အသစ်ပြန်လည်ရေးသားခြင်း
            with open('metadata.json', 'w', encoding='utf-8') as f:
                json.dump(new_metadata, f, ensure_ascii=False, indent=2)
                
            print(f'Successfully split {len(valid_nodes)} nodes. Metadata updated.')
        else:
            print("No valid nodes fetched. Keeping existing files to avoid empty data.")
        EOF
        python fetch_and_meta.py
        rm fetch_and_meta.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # ၁။ လက်ရှိ လုပ်ထားတဲ့ အပြောင်းအလဲတွေကို ခေတ္တ သိမ်းဆည်း (Stash) ထားပါသည်
        git stash --include-untracked
        
        # ၂။ GitHub ပေါ်က နောက်ဆုံး ကုဒ်ကို လုံခြုံစွာ Pull ဆွဲယူပါသည်
        git pull origin main --rebase
        
        # ၃။ ခေတ္တသိမ်းထားခဲ့သော အပြောင်းအလဲများကို ပြန်ထုတ်ယူပါသည်
        git stash pop 2>/dev/null || true
        
        # ၄။ Git ထဲက ဖိုင်ဟောင်းစာရင်းများကို အရင်ရှင်းထုတ်ပါသည်
        git rm sub_part* 2>/dev/null || true
        
        # ၅။ အသစ်ထွက်လာသော ဖိုင်များကို ပြန်ထည့်ပါသည်
        git add sub_part* 2>/dev/null || true
        git add metadata.json 2>/dev/null || true
        
        # ၆။ အမှန်တကယ် ပြောင်းလဲမှုရှိမှသာ Commit လုပ်ပြီး Push လုပ်ပါသည်
        if ! git diff --quiet --staged; then
          git commit -m "Update proxy nodes and metadata [skip ci]"
          git push origin main
        else
          echo "No changes to commit."
        fi
