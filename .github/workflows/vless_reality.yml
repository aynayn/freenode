name: Fetch and Filter Clean Proxy Nodes

on:
  schedule:
    - cron: '0 */1 * * *' # ၁ နာရီတစ်ကြိမ် Auto Run မည်
  workflow_dispatch: # Manual နှိပ်ပြီး Run ချင်လျှင်လည်း ရသည်

permissions:
  contents: write # ရလဒ်များကို Repo ထဲသို့ ပြန်သိမ်းရန် အခွင့်အရေးပေးခြင်း

jobs:
  collect-nodes:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Fetch and Filter Nodes
      run: |
        python -c "
        import requests
        import base64
        import re
        import os
        import glob

        base_dom = 'https://' + 'raw.' + 'githubusercontent' + '.com/'
        headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)'}

        sources = [
            base_dom + 'Epodonios/v2ray-configs/main/Splitted-By-Protocol/vless.txt',
            base_dom + 'Epodonios/v2ray-configs/main/Splitted-By-Protocol/trojan.txt',
            base_dom + 'ebrasha/free-v2ray-public-list/refs/heads/main/vless_configs.txt',
            base_dom + 'ebrasha/free-v2ray-public-list/refs/heads/main/trojan_configs.txt',
            base_dom + 'barry-far/V2ray-config/main/Splitted-By-Protocol/vless.txt',
            base_dom + 'barry-far/V2ray-config/main/Splitted-By-Protocol/trojan.txt',
            base_dom + 'MatinGhanbari/v2ray-configs/main/subscriptions/filtered/subs/vless.txt',
            base_dom + 'MatinGhanbari/v2ray-configs/main/subscriptions/filtered/subs/trojan.txt',
            base_dom + 'MatinGhanbari/v2ray-configs/main/subscriptions/filtered/subs/hysteria2.txt',
            base_dom + 'SoliSpirit/v2ray-configs/refs/heads/main/Protocols/vless.txt',
            base_dom + 'SoliSpirit/v2ray-configs/refs/heads/main/Protocols/trojan.txt'
        ]

        valid_nodes = []

        def extract_nodes(text):
            lines = text.split('\n')
            for line in lines:
                line = line.strip()
                if line.startswith('vless://') and 'reality' in line.lower():
                    if line not in valid_nodes: valid_nodes.append(line)
                elif line.startswith('trojan://'):
                    if line not in valid_nodes: valid_nodes.append(line)
                elif line.startswith('hy2://') or line.startswith('hysteria2://'):
                    if line not in valid_nodes: valid_nodes.append(line)

        for url in sources:
            try:
                res = requests.get(url, headers=headers, timeout=15)
                if res.status_code == 200:
                    content = res.text
                    cleaned_content = content.replace('\r', '').replace('\n', '').strip()
                    if cleaned_content and not any(s in cleaned_content for s in ['vless://', 'trojan://', 'hy2://']):
                        try:
                            content = base64.b64decode(cleaned_content).decode('utf-8')
                        except:
                            pass
                    extract_nodes(content)
            except Exception as e:
                print(f'Error fetching from {url}: {e}')

        # အရင်ကကျန်ခဲ့သမျှ sub_part ဖိုင်အဟောင်းအားလုံးကို အကုန်သုတ်သင်ရှင်းလင်းခြင်း
        for f in glob.glob('sub_part*'):
            try: os.remove(f)
            except: pass

        # Node အရေအတွက်ကို ၁,၀၀၀ စီ ခွဲထုတ်သိမ်းဆည်းခြင်း (000, 001, 002 အစဉ်အတိုင်း)
        chunk_size = 1000
        total_parts = 0
        
        if valid_nodes:
            for i in range(0, len(valid_nodes), chunk_size):
                part_nodes = valid_nodes[i:i + chunk_size]
                part_str = f'{(i // chunk_size):03d}'
                
                combined_text = '\n'.join(part_nodes)
                b64_content = base64.b64encode(combined_text.encode('utf-8')).decode('utf-8')
                
                with open(f'sub_part{part_str}.txt', 'w', encoding='utf-8') as f:
                    f.write(b64_content)
                total_parts += 1

        print(f'Successfully split {len(valid_nodes)} nodes into {total_parts} parts.')
        "

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # ဖိုင်ဟောင်း/ဖိုင်သစ် အပြောင်းအလဲအားလုံးကို သိမ်းဆည်းခြင်း
        git add -A sub_part* 2>/dev/null || true
        
        # ပြောင်းလဲမှုရှိမှသာ အလုပ်လုပ်မည်
        if ! git diff --quiet --staged; then
          git commit -m "Update and split clean proxy nodes [skip ci]"
          
          # Conflict မဖြစ်စေရန် အဝေးမှ နောက်ဆုံးဒေတာကို ဆွဲယူပေါင်းစပ်ခြင်း (အရေးကြီးဆုံးအချက်)
          git pull --rebase origin main
          
          git push
        else
          echo "No changes to commit."
        fi
