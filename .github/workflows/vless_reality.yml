name: Fetch and Split Clean Proxy Nodes

on:
  schedule:
    - cron: '0 */1 * * *' # ၁ နာရီတစ်ကြိမ် Auto Run မည်
  workflow_dispatch: # Manual နှိပ်ပြီး Run ချင်လျှင်လည်း ရသည်

permissions:
  contents: write # ရလဒ်များကို Repo ထဲသို့ ပြန်သိမ်းရန် အခွင့်အရေးပေးခြင်း

jobs:
  collect-nodes:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Fetch and Split Nodes
      run: |
        python -c "
        import requests
        import base64
        import os
        import glob

        # လင့်ခ်များ စနစ်အတွင်း ဖြတ်တောက်မခံရစေရန် စာသားပေါင်းစပ်နည်းဖြင့် သေချာရေးထားပါသည်
        domain = 'https://' + 'raw.' + 'githubusercontent' + '.com/'

          'https://raw.githubusercontent.com/Epodonios/v2ray-configs/main/Splitted-By-Protocol/vless.txt',
          'https://raw.githubusercontent.com/Epodonios/v2ray-configs/main/Splitted-By-Protocol/trojan.txt',
          'https://raw.githubusercontent.com/ebrasha/free-v2ray-public-list/refs/heads/main/vless_configs.txt',
          'https://raw.githubusercontent.com/ebrasha/free-v2ray-public-list/refs/heads/main/trojan_configs.txt',
          'https://raw.githubusercontent.com/barry-far/V2ray-config/main/Splitted-By-Protocol/vless.txt',
          'https://raw.githubusercontent.com/barry-far/V2ray-config/main/Splitted-By-Protocol/trojan.txt',
          'https://raw.githubusercontent.com/MatinGhanbari/v2ray-configs/main/subscriptions/filtered/subs/vless.txt',
          'https://raw.githubusercontent.com/MatinGhanbari/v2ray-configs/main/subscriptions/filtered/subs/trojan.txt',
          'https://raw.githubusercontent.com/MatinGhanbari/v2ray-configs/main/subscriptions/filtered/subs/hysteria2.txt',
          'https://raw.githubusercontent.com/SoliSpirit/v2ray-configs/refs/heads/main/Protocols/vless.txt',
          'https://raw.githubusercontent.com/SoliSpirit/v2ray-configs/refs/heads/main/Protocols/trojan.txt',

        sources = [link1, link2, link3, link4, link5]
        valid_nodes = []

        for url in sources:
            try:
                res = requests.get(url, timeout=20)
                if res.status_code == 200:
                    content = res.text
                    try:
                        cleaned_content = content.replace('\r', '').replace('\n', '').strip()
                        content = base64.b64decode(cleaned_content).decode('utf-8')
                    except Exception:
                        pass
                    
                    lines = content.split('\n')
                    for line in lines:
                        line = line.strip()
                        if line.startswith('vless://') and 'reality' in line.lower():
                            if line not in valid_nodes: valid_nodes.append(line)
                        elif line.startswith('trojan://'):
                            if line not in valid_nodes: valid_nodes.append(line)
                        elif line.startswith('hy2://') or line.startswith('hysteria2://'):
                            if line not in valid_nodes: valid_nodes.append(line)
            except Exception as e:
                print(f'Error fetching from {url}: {e}')

        # ယခင်ရှိခဲ့သော ဖိုင်ဟောင်းများကို အကုန်ရှင်းလင်းပါမည်
        for f in glob.glob('sub_part*.txt'):
            try: os.remove(f)
            except: pass

        # Node အရေအတွက်ကို ၁,၀၀၀ စီ ခွဲထုတ်ပါမည်
        chunk_size = 1000
        for i in range(0, len(valid_nodes), chunk_size):
            part_nodes = valid_nodes[i:i + chunk_size]
            part_num = (i // chunk_size) + 1
            
            combined_text = '\n'.join(part_nodes)
            b64_content = base64.b64encode(combined_text.encode('utf-8')).decode('utf-8')
            
            # ဖိုင်အမည်များကို sub_part1.txt, sub_part2.txt ဟု ခွဲသိမ်းပါမည်
            with open(f'sub_part{part_num}.txt', 'w', encoding='utf-8') as f:
                f.write(b64_content)

        print(f'Successfully split {len(valid_nodes)} nodes into {part_num} parts.')
        "

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@://github.com"
        git config --local user.name "github-actions[bot]"
        git add sub_part*.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update and split clean proxy nodes [skip ci]" && git push)
